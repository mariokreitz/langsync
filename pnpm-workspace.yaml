packages:
  - 'packages/*'
  - 'apps/*'

# Trusted build scripts (esbuild + sharp/unrs-resolver compile native binaries).
onlyBuiltDependencies:
  - esbuild
  - sharp
  - unrs-resolver

allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true

overrides:
  esbuild: ^0.25.12
  postcss: ^8.5.15
  uuid: ^11.1.1
  vite: ^6.4.2

# Shared dependency versions across the monorepo to prevent drift.
catalog:
  chalk: ^5.6.2
  commander: ^12.1.0
  ora: ^8.2.0
  prompts: ^2.4.2
  listr2: ^8.3.3
  exceljs: ^4.4.0
  chokidar: ^4.0.3
  zod: ^3.25.76
  cosmiconfig: ^9.0.1
  vitest: ^4.1.7
  tsup: ^8.5.1
  typescript: ^5.9.3

minimumReleaseAgeExclude:
  - '@jsonjoy.com/fs-core@4.57.3'
  - '@jsonjoy.com/fs-fsa@4.57.3'
  - '@jsonjoy.com/fs-node-builtins@4.57.3'
  - '@jsonjoy.com/fs-node-to-fsa@4.57.3'
  - '@jsonjoy.com/fs-node-utils@4.57.3'
  - '@jsonjoy.com/fs-node@4.57.3'
  - '@jsonjoy.com/fs-print@4.57.3'
  - '@jsonjoy.com/fs-snapshot@4.57.3'
  - '@turbo/darwin-64@2.9.16'
  - '@turbo/darwin-arm64@2.9.16'
  - '@turbo/linux-64@2.9.16'
  - '@turbo/linux-arm64@2.9.16'
  - '@turbo/windows-64@2.9.16'
  - '@turbo/windows-arm64@2.9.16'
  - memfs@4.57.3
  - turbo@2.9.16
  - esbuild@0.24.3
  - vite@6.4.2
  - postcss@8.5.10
  - uuid@11.1.1
