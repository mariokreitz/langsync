name: Release

on:
  # Fire ONLY on intentional release events:
  #   - a semver tag is pushed (the canonical "release" signal)
  #   - someone clicks "Run workflow" in the Actions tab
  # This prevents every commit on main from re-attempting a publish.
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Pack without publishing (dry-run)'
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Verify npm authentication
        # Fails fast with a clear message if NPM_TOKEN is invalid, expired,
        # or read-only — instead of letting npm return a misleading 404.
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish (dry-run)
        if: ${{ inputs.dry-run == true }}
        run: pnpm --filter langsync-cli publish --dry-run --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: ${{ inputs.dry-run != true }}
        run: pnpm --filter langsync-cli publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Re-enable provenance once first publish has succeeded and the
          # NPM_TOKEN supports signed provenance statements.
          # NPM_CONFIG_PROVENANCE: true
