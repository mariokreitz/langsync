name: PR checks

on:
  push:
    branches: ['changeset-release/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changeset-check:
    name: Changeset check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      github.actor != 'dependabot[bot]' &&
      !startsWith(github.head_ref, 'changeset-release/') &&
      !startsWith(github.ref_name, 'changeset-release/')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for changeset when published packages change
        env:
          BASE_REF: ${{ github.base_ref || github.event.repository.default_branch }}
        run: |
          BASE="$BASE_REF"

          CHANGED=$(git diff --name-only "origin/${BASE}...HEAD" \
            -- packages/cli/src \
               packages/core/src \
               packages/shared/src \
               packages/excel-engine/src \
               packages/ai-engine/src 2>/dev/null || true)

          if [ -z "$CHANGED" ]; then
            echo "No changes to published package sources — changeset not required."
            exit 0
          fi

          echo "Changed source files detected:"
          echo "$CHANGED"
          echo ""

          NEW_CS=$(git diff --name-only --diff-filter=A "origin/${BASE}...HEAD" \
            -- '.changeset/*.md' 2>/dev/null | grep -v 'README.md' || true)

          if [ -z "$NEW_CS" ]; then
            echo "::error::Changes detected in published packages but no changeset found."
            echo "::error::Run 'pnpm changeset' and commit the generated file."
            exit 1
          fi

          echo "Changeset(s) found — OK:"
          echo "$NEW_CS"

  commitlint-check:
    name: Commit message lint
    if: |
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]' &&
      !startsWith(github.ref_name, 'changeset-release/')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint commit messages
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: pnpm exec commitlint --from "origin/${BASE_REF}" --to HEAD --verbose
