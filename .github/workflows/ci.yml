name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, Typecheck, Build, Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        # Activates the pnpm version pinned in package.json#packageManager.
        # Avoids pnpm/action-setup self-installer instability on current runners.
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ----- Quality gates, in fail-fast / cost-ascending order -----
      #
      # 1. format:check   — style only, no build needed, cheapest signal.
      # 2. build          — produces dist/ d.ts files that the type-aware
      #                     lint rules (and typecheck) depend on. Turbo
      #                     handles caching across runs.
      # 3. typecheck      — verifies the TypeScript contract for every
      #                     package, including files not bundled by tsup.
      # 4. lint           — runs typed ESLint rules that need d.ts from
      #                     workspace deps; turbo guarantees ^build first.
      # 5. test:coverage  — most expensive; runs only if the rest passed.
      # 6. codecov upload — only on green tests.

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            ./packages/core/coverage/lcov.info,
            ./packages/shared/coverage/lcov.info,
            ./packages/excel-engine/coverage/lcov.info,
            ./packages/cli/coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
